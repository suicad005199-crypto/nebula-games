<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>星雲娛樂城 | NEBULA CASINO</title>
    <style>
        :root { 
            --gold: #fccd4d;
            --gold-grad: linear-gradient(135deg, #fccd4d 0%, #fb9a32 100%);
            --bg: #0b0b0d; 
            --card: #161618;
            --border: rgba(255, 255, 255, 0.08);
            --nav-h: 60px;
            --sidebar-w: 260px;
        }
        
        body { 
            margin: 0; background: var(--bg); color: white; 
            font-family: 'PingFang TC', sans-serif; overflow-x: hidden;
        }

        /* 導航列 */
        .navbar { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: env(safe-area-inset-top) 15px 10px; 
            background: rgba(11, 11, 13, 0.95); backdrop-filter: blur(20px); 
            position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border);
        }
        .logo { font-size: 18px; font-weight: 900; color: var(--gold); letter-spacing: 1px; }

        /* 1. BANNER 區 */
        .hero { padding: 10px 15px; }
        /* 1. BANNER 區高度優化 */
        .promo-banner { 
         width: 100%; 
         height: 110px; /* 從 150px 調降，增加遊戲區可視度 */
         border-radius: 12px; 
         overflow: hidden; 
         position: relative; 
         border: 1px solid var(--border);
         }

        /* 額外優化：讓公告欄稍微扁平一點 */
        .marquee-bar {
         background: #1a1a1d; 
         height: 28px; /* 從 32px 調降 */
         display: flex; 
         align-items: center;
         padding: 0 15px; 
         font-size: 11px; 
         border-bottom: 1px solid var(--border);
         }
        .marquee-label { color: var(--gold); font-weight: bold; margin-right: 10px; white-space: nowrap; }
        .marquee-content { flex: 1; overflow: hidden; white-space: nowrap; }
        .marquee-text { display: inline-block; animation: scroll 15s linear infinite; }
        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* 3. 遊戲區標題 */
        .section-header { padding: 15px 15px 5px; display: flex; align-items: center; gap: 8px; }
        .section-title { font-size: 14px; font-weight: bold; color: var(--gold); margin: 0; }
        .section-line { flex: 1; height: 1px; background: var(--border); }

        /* 4. 遊戲網格 */
        .game-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 10px 15px 20px; min-height: 300px; }
        .game-card { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
        .game-img-wrapper { position: relative; aspect-ratio: 4/3; }
        .game-img { width: 100%; height: 100%; background-size: cover; background-position: center; }
        .game-info { padding: 8px 10px; }
        .game-title { font-weight: 600; font-size: 13px; margin-bottom: 2px; }
        .game-desc { color: #666; font-size: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* 分頁器 */
        .pagination { display: flex; justify-content: center; align-items: center; gap: 15px; padding-bottom: 100px; }
        .page-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: #fff; padding: 6px 15px; border-radius: 20px; font-size: 12px; }
        .page-btn:disabled { opacity: 0.3; }

        /* 側邊欄 (選單) */
        .sidebar {
            position: fixed; top: 0; left: calc(-1 * var(--sidebar-w)); width: var(--sidebar-w); height: 100%;
            background: var(--bg); z-index: 2000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-right: 1px solid var(--border); padding-top: env(safe-area-inset-top);
        }
        .sidebar.open { left: 0; }
        .sidebar-header { padding: 20px; font-size: 18px; font-weight: bold; color: var(--gold); border-bottom: 1px solid var(--border); }
        .sidebar-menu { list-style: none; padding: 10px 0; margin: 0; }
        .sidebar-menu li { padding: 15px 25px; display: flex; align-items: center; gap: 12px; color: #ccc; font-size: 15px; transition: 0.2s; }
        .sidebar-menu li i { font-style: normal; font-size: 18px; }
        .sidebar-menu li.active { background: rgba(252, 205, 77, 0.1); color: var(--gold); font-weight: bold; }

        /* 遮罩 */
        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
            z-index: 1500; opacity: 0; visibility: hidden; transition: 0.3s;
        }
        .overlay.active { opacity: 1; visibility: visible; }

        /* 底部導航 (排序優化) */
        .tab-bar {
            position: fixed; bottom: 0; width: 100%; height: var(--nav-h);
            background: rgba(15, 15, 17, 0.98); backdrop-filter: blur(20px);
            border-top: 1px solid var(--border); display: flex; z-index: 1000;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #888; border: none; background: none; font-size: 10px; cursor: pointer; }
        .tab-item.active { color: var(--gold); }
        .tab-item i { font-size: 20px; margin-bottom: 2px; font-style: normal; }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">遊戲選單</div>
        <ul class="sidebar-menu">
            <li onclick="filterCategory('all', this)" class="active"><i>🏠</i> 全部遊戲</li>
            <li onclick="filterCategory('棋牌', this)"><i>🃏</i> 棋牌中心</li>
            <li onclick="filterCategory('老虎機', this)"><i>🎰</i> 老虎機</li>
            <li onclick="filterCategory('限定', this)"><i>🔞</i> 限定推薦</li>
            <li onclick="filterCategory('LIVE', this)"><i>📺</i> 直播LIVE</li>
        </ul>
    </aside>

    <header class="navbar">
        <div class="logo">NEBULA CASINO</div>
        <button class="login-btn" id="login-btn" style="background:var(--gold-grad); border:none; border-radius:20px; padding:6px 16px; font-weight:bold; font-size:12px;">登入</button>
    </header>

    <section class="hero">
        <div class="promo-banner" id="promo-banner">
            <div class="banner-slide active" style="background-image: url('./images/banner.jpg');"></div>
            <div class="banner-slide" style="background-image: url('./images/banner2.jpg');"></div>
        </div>
    </section>

    <div class="marquee-bar">
        <span class="marquee-label">NOTICE</span>
        <div class="marquee-content">
            <span class="marquee-text">歡迎來到星雲娛樂城，首儲即送 100% 禮金！全站遊戲公平公正，祝您好運。</span>
        </div>
    </div>

    <div class="section-header">
        <h3 class="section-title" id="display-title">熱門推薦 TOP 4</h3>
        <div class="section-line"></div>
    </div>

    <main class="game-grid" id="game-grid">
        </main>

    <div class="pagination" id="pagination" style="display: none;">
        <button class="page-btn" id="prev-btn" onclick="changePage(-1)">PREV</button>
        <span id="page-num" style="color: var(--gold); font-weight: bold;">1</span>
        <button class="page-btn" id="next-btn" onclick="changePage(1)">NEXT</button>
    </div>

    <nav class="tab-bar">
        <button class="tab-item active" onclick="handleTabClick(this, 'lobby')"><i>🏠</i><span>大廳</span></button>
        <button class="tab-item" onclick="handleTabClick(this, 'deposit')"><i>💰</i><span>儲值</span></button>
        <button class="tab-item" onclick="toggleMenu()"><i>☰</i><span>選單</span></button>
        <button class="tab-item" onclick="handleTabClick(this, 'service')"><i>🎧</i><span>客服</span></button>
        <button class="tab-item" onclick="handleTabClick(this, 'member')"><i>👤</i><span>會員</span></button>
    </nav>

    <script type="module">
        import { auth } from './js/auth.js';

        // 1. 側邊欄開關邏輯
        window.toggleMenu = () => {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        };

        // 2. Tab Bar 點擊處理
        window.handleTabClick = (el, type) => {
            // 排除選單按鈕的 active 狀態切換，因為選單是彈出層
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            el.classList.add('active');

            if (type === 'lobby') {
                // 如果在大廳，重置分類為全部
                if (window.filterCategory) window.filterCategory('all');
            } else {
                alert(`${el.innerText} 功能建置中...`);
            }
        };

        // 3. 簡單 Banner 切換
        function initBanner() {
            const slides = document.querySelectorAll('.banner-slide');
            let current = 0;
            if (slides.length <= 1) return;
            setInterval(() => {
                slides[current].classList.remove('active');
                current = (current + 1) % slides.length;
                slides[current].classList.add('active');
            }, 5000);
        }
        initBanner();
    </script>
    <script type="module" src="./js/lobby.js"></script>
</body>
</html>
