<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>星雲娛樂城 | NEBULA CASINO</title>
    <style>
        :root { 
            --gold: #fccd4d; 
            --bg: #0b0b0d; 
            --card: #161618;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }
        
        body { margin: 0; background: var(--bg); color: white; font-family: 'Inter', -apple-system, sans-serif; overflow-x: hidden; }

        /* 導航列 */
        .navbar { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: env(safe-area-inset-top) 20px 10px; 
            background: rgba(11, 11, 13, 0.9); backdrop-filter: blur(20px); 
            position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border);
        }
        .logo { font-size: 18px; font-weight: 900; color: var(--gold); letter-spacing: 1.5px; text-transform: uppercase; }
        .menu-btn { font-size: 26px; color: var(--gold); cursor: pointer; transition: 0.2s; }

        /* 側邊選單 */
        .sidebar { 
            position: fixed; top: 0; left: -100%; width: 280px; height: 100%; 
            background: #0f0f11; z-index: 1001; 
            transition: 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column;
        }
        .sidebar.open { left: 0; }
        .sidebar-header { padding: 60px 25px 30px; border-bottom: 1px solid var(--border); }
        .sidebar-header h2 { margin: 0; font-size: 20px; color: var(--gold); }

        .sidebar-menu { list-style: none; padding: 20px 0; margin: 0; flex-grow: 1; }
        .sidebar-menu li { 
            padding: 18px 25px; font-size: 15px; color: #aaa; 
            cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 12px;
        }
        .sidebar-menu li:active, .sidebar-menu li.active { background: var(--glass); color: var(--gold); }
        .sidebar-menu li i { font-style: normal; font-size: 18px; }

        /* 背景遮罩 */
        .overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.8); 
            backdrop-filter: blur(5px); opacity: 0; visibility: hidden; z-index: 1000; transition: 0.3s; 
        }
        .overlay.active { opacity: 1; visibility: visible; }

        /* 英雄公告區 */
        .hero { padding: 15px; }
        .promo-banner { 
         width: 100%; 
         height: 140px; 
         border-radius: 16px;
         border: 1px solid var(--border); 
         display: flex; 
         align-items: center; 
         justify-content: center;
    
         /* --- 修改重點：置入圖片 --- */
         background-image: url('./images/banner.png'); /* 替換成你的圖片檔名 */
         background-size: cover;      /* 讓圖片填滿整個框 */
         background-position: center; /* 讓圖片置中 */
         background-repeat: no-repeat;
         }

         /* 移除原本的偽元素文字 (如果你不想看到 NEBULA EXCLUSIVE) */
         .promo-banner::after { 
          display: none; 
          }

        /* 遊戲網格 (優化：縮小卡片比例) */
        .game-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px 15px 20px; }
        .game-card { 
            background: var(--card); border-radius: 10px; overflow: hidden; 
            border: 1px solid var(--border); transition: 0.2s; position: relative;
        }
        .game-card:active { transform: scale(0.96); }
        .game-img-wrapper { position: relative; width: 100%; aspect-ratio: 1/1; }
        .game-img { width: 100%; height: 100%; background-size: cover; background-position: center; }
        .game-badge { 
            position: absolute; bottom: 6px; left: 6px; background: rgba(0,0,0,0.7); 
            padding: 2px 6px; border-radius: 4px; font-size: 9px; color: var(--gold); backdrop-filter: blur(4px);
        }
        /* 優化：縮小文字與內距 */
        .game-info { padding: 8px; text-align: left; }
        .game-title { color: #fff; font-weight: 600; font-size: 12px; margin-bottom: 2px; }
        .game-desc { color: #555; font-size: 9px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* 分頁器樣式 */
        .pagination { 
            display: flex; justify-content: center; align-items: center; 
            gap: 15px; margin-bottom: 40px; 
        }
        .page-btn { 
            background: var(--glass); border: 1px solid var(--border); 
            color: #aaa; padding: 6px 14px; border-radius: 20px; 
            font-size: 12px; cursor: pointer; transition: 0.3s;
        }
        .page-btn:active:not(:disabled) { background: var(--gold); color: #000; border-color: var(--gold); }
        .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .page-info { font-size: 13px; color: var(--gold); font-weight: bold; }
    </style>
</head>
<body>
    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
    
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header"><h2>選單 MENU</h2></div>
        <ul class="sidebar-menu">
            <li onclick="filterCategory('all', this)" class="active"><i>🏠</i> 全部遊戲</li>
            <li onclick="filterCategory('棋牌', this)"><i>🃏</i> 棋牌中心</li>
            <li onclick="filterCategory('老虎機', this)"><i>🎰</i> 熱門老虎機</li>
            <li onclick="filterCategory('限定', this)"><i>🔥</i> 限定推薦</li>
            <li onclick="filterCategory('LIVE', this)"><i>📺</i> 真人視訊</li>
        </ul>
    </nav>

    <header class="navbar">
        <div class="menu-btn" onclick="toggleMenu()">☰</div>
        <div class="logo">NEBULA CASINO</div>
        <button class="login-btn" style="background:var(--gold); border:none; border-radius:20px; padding:6px 15px; font-weight:bold; font-size:12px;">登入</button>
    </header>

    <section class="hero">
        <div class="promo-banner"></div>
    </section>

    <main class="game-grid" id="game-grid">
        <p style="text-align: center; grid-column: span 2; padding: 40px; color: #333;">LOADING...</p>
    </main>

    <div class="pagination" id="pagination" style="display: none;">
        <button class="page-btn" id="prev-btn" onclick="changePage(-1)">◀ 上一頁</button>
        <span class="page-info" id="page-num">1</span>
        <button class="page-btn" id="next-btn" onclick="changePage(1)">下一頁 ▶</button>
    </div>

    <script type="module" src="./js/lobby.js"></script>
    <script>
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        }
        window.toggleMenu = toggleMenu;
    </script>
</body>
</html>
