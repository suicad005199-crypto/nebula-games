<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星雲娛樂城 - 遊戲大廳</title>
    <style>
        :root {
            --gold: #d4af37;
            --dark-bg: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-color: #ffffff;
        }

        body {
            margin: 0;
            background-color: var(--dark-bg);
            font-family: Arial, sans-serif;
            color: var(--text-color);
        }

        /* 標題欄 */
        .header {
            display: flex;
            justify-content: space-between;
            padding: 15px;
            background: linear-gradient(to bottom, #333, #000);
            border-bottom: 2px solid var(--gold);
        }

        .logo { color: var(--gold); font-weight: bold; font-size: 1.2rem; }

        /* 遊戲網格 */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 20px;
        }

        /* 遊戲卡片樣式 */
        .game-card {
            background-color: var(--card-bg);
            border: 1px solid var(--gold);
            border-radius: 10px;
            text-align: center;
            padding: 20px 10px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }

        .game-card:active {
            transform: scale(0.95);
            box-shadow: 0 0 15px var(--gold);
        }

        .game-card .icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
            display: block;
        }

        .game-card span {
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* 底部導航 */
        .nav-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            display: flex;
            justify-content: space-around;
            background: #000;
            padding: 10px 0;
            border-top: 1px solid #444;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">星雲娛樂城</div>
        <div class="balance">💰 $88,888</div>
    </div>

    <div class="game-grid">
        <div class="game-card" onclick="alert('進入 21點')">
            <span class="icon">🃏</span>
            <span>21點</span>
        </div>
        <div class="game-card" onclick="alert('進入 北京賽車')">
            <span class="icon">🏎️</span>
            <span>北京賽車</span>
        </div>
        <div class="game-card" onclick="alert('進入 德州撲克')">
            <span class="icon">♠️</span>
            <span>德州撲克</span>
        </div>
        <div class="game-card" onclick="alert('進入 推筒子')">
            <span class="icon">🀄</span>
            <span>推筒子</span>
        </div>
        <div class="game-card" onclick="alert('進入 百家樂')">
            <span class="icon">💎</span>
            <span>百家樂</span>
        </div>
        <div class="game-card" onclick="alert('進入 射龍門')">
            <span class="icon">🐉</span>
            <span>射龍門</span>
        </div>
    </div>

    <div class="nav-bar">
        <span>首頁</span>
        <span>優惠</span>
        <span>儲值</span>
        <span>客服</span>
    </div>

</body>
</html>
