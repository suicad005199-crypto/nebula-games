<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>Gemini Slot - Lock & Respin</title>
<style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        .slot-machine { background: #333; padding: 20px; border-radius: 15px; border: 5px solid #555; margin-top: 20px; }
        .grid { display: flex; gap: 10px; background: #000; padding: 10px; border-radius: 8px; }
        .reel { display: flex; flex-direction: column; gap: 10px; }
        .cell { width: 80px; height: 80px; background: #222; display: flex; align-items: center; justify-content: center; font-size: 40px; border-radius: 5px; border: 2px solid #444; transition: all 0.2s; }
        .cell.locked { border-color: #f1c40f; box-shadow: 0 0 15px #f1c40f; }
        .cell.win { background: #440000; border-color: #ff0000; animation: blink 0.5s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
        .controls { margin-top: 20px; text-align: center; }
        button { padding: 10px 30px; font-size: 18px; cursor: pointer; background: #e74c3c; color: white; border: none; border-radius: 5px; }
        button:disabled { background: #7f8c8d; }
        .stats { margin-top: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 300px; }
        .status-msg { height: 30px; margin-top: 10px; color: #f1c40f; font-weight: bold; }
</style>
</head>
<body>
 
    <h2>🎰 特色鎖定老虎機</h2>
<div class="slot-machine">
<div class="grid" id="grid">
<div class="reel" id="reel-0">
<div class="cell">?</div><div class="cell">?</div><div class="cell">?</div>
</div>
<div class="reel" id="reel-1">
<div class="cell">?</div><div class="cell">?</div><div class="cell">?</div>
</div>
<div class="reel" id="reel-2">
<div class="cell">?</div><div class="cell">?</div><div class="cell">?</div>
</div>
</div>
</div>
 
    <div class="status-msg" id="status">準備好贏錢了嗎？</div>
 
    <div class="controls">
<button id="spin-btn" onclick="handleSpin()">SPIN (10 PTS)</button>
</div>
 
    <div class="stats">
<div>餘額: <span id="balance">1000</span></div>
<div>最後得分: <span id="last-win">0</span></div>
</div>
 
<script>
    // 原始代碼數據
    const REELS_DATA = [
        ["🍒","🍒","🍒","🍉","🍒","🔔","🍒","🍉","🍒","🎰","🍉","🍉","🍉","🍒","🔔","🍒","🍉","🍒","🎰","🍒","🍉","🍒","🔔","🔔","🔔","🍒","🍉","🍒","🎰","🍒","🍉","🍒","🔔","🍒","🎰","🎰","🎰","🍉","🍒","🔔","🍒","🍉","🍒","🍒","🍉","🍒","🔔","🍒","🍉","🍒","🎰","🍒","🍉","🍒","🔔","🍒","🍉","🍒","🍒","🍉","🔔","🍒","🍉","🍒"],
        ["🍒","🍒","🍒","🍉","🍒","🔔","🍒","🍉","🍒","🎰","🍉","🍉","🍉","🔔","🔔","🔔","🍒","🍒","🍒","🍉","🍒","🎰","🍒","🍉","🍒","🔔","🍒","🍉","🎰","🎰","🎰","🍒","🍉","🍒","🔔","🍒","🍉","🍒","🍒","🍉","🔔","🍒","🍉","🍒","🎰","🍒","🍉","🍒","🔔","🍒","🍒","🍒","🍉","🍒","🔔","🍒","🍉","🍒","🎰","🍉","🍒"],
        ["🎰","🎰","🎰","🍒","🍒","🍒","🍉","🍉","🍉","🔔","🔔","🔔","🍒","🍉","🍒","🎰","🍒","🍉","🍒","🔔","🍒","🍒","🍒","🍒","🍉","🍉","🍉","🍒","🔔","🍒","🍉","🍒","🎰","🍒","🍉","🍒","🔔","🔔","🔔","🍒","🍉","🍒","🎰","🎰","🎰","🍉","🍒","🔔","🍒","🍉","🍒","🍒","🍉","🍒","🔔","🍒","🍉","🍒","🎰","🍒","🍉","🍒","🔔"]
    ];
 
    const PAYOUT = { "🎰": 100, "🔔": 50, "🍉": 15, "🍒": 8 };
    const PAYLINES = [
        [1, 1, 1], // 中橫
        [0, 0, 0], // 上橫
        [2, 2, 2], // 下橫
        [0, 1, 2], // 斜下
        [2, 1, 0]  // 斜上
    ];
 
    let balance = 1000;
    let isSpinning = false;
 
    function getSpinResult() {
        return REELS_DATA.map(strip => {
            const stop = Math.floor(Math.random() * strip.length);
            return [0, 1, 2].map(i => strip[(stop + i) % strip.length]);
        });
    }
 
    function checkWin(grid) {
        let win = 0;
        let winningLines = [];
        PAYLINES.forEach((line, index) => {
            const s0 = grid[0][line[0]];
            const s1 = grid[1][line[1]];
            const s2 = grid[2][line[2]];
            if (s0 === s1 && s1 === s2) {
                win += PAYOUT[s0];
                winningLines.push(index);
            }
        });
        return { win, winningLines };
    }
 
    function isStacked(reelData) {
        return reelData[0] === reelData[1] && reelData[1] === reelData[2];
    }
 
    function updateUI(grid, locks = [], winCells = []) {
        grid.forEach((reel, rIdx) => {
            const cells = document.getElementById(`reel-${rIdx}`).getElementsByClassName('cell');
            reel.forEach((sym, cIdx) => {
                cells[cIdx].innerText = sym;
                cells[cIdx].className = 'cell';
                if (locks.includes(rIdx)) cells[cIdx].classList.add('locked');
            });
        });
    }
 
    async function handleSpin() {
        if (isSpinning || balance < 10) return;
        isSpinning = true;
        balance -= 10;
        document.getElementById('balance').innerText = balance;
        document.getElementById('spin-btn').disabled = true;
        document.getElementById('status').innerText = "旋轉中...";
 
        let grid = getSpinResult();
        updateUI(grid);
 
        let stackedIdx = [];
        grid.forEach((reel, i) => { if (isStacked(reel)) stackedIdx.push(i); });
 
        // Feature 邏輯
        if (stackedIdx.length > 0) {
            document.getElementById('status').innerText = "✨ 觸發鎖定 Respin！";
            await new Promise(r => setTimeout(r, 800));
            let locks = [stackedIdx[0]]; // 簡化邏輯：鎖定第一個滿軸
            if (stackedIdx.length > 1) {
                // 如果有多個，鎖定最高分的
                locks = [stackedIdx.sort((a,b) => PAYOUT[grid[b][0]] - PAYOUT[grid[a][0]])[0]];
            }
 
            for (let i = 0; i < 10; i++) {
                // 旋轉未鎖定的
                grid.forEach((reel, idx) => {
                    if (!locks.includes(idx)) grid[idx] = getSpinResult()[idx];
                });
                updateUI(grid, locks);
                await new Promise(r => setTimeout(r, 500));
 
                let result = checkWin(grid);
                if (result.win > 0) break; // 中獎即停止
 
                // 檢查是否有新的滿軸要鎖定
                let newStacked = false;
                grid.forEach((reel, idx) => {
                    if (!locks.includes(idx) && isStacked(reel)) {
                        locks.push(idx);
                        newStacked = true;
                    }
                });
                if (!newStacked && locks.length < 3) { /* 繼續轉 */ }
                if (locks.length === 3) break;
            }
        }
 
        let finalResult = checkWin(grid);
        balance += finalResult.win;
        document.getElementById('balance').innerText = balance;
        document.getElementById('last-win').innerText = finalResult.win;
        document.getElementById('status').innerText = finalResult.win > 0 ? `恭喜贏得 ${finalResult.win}！` : "可惜沒中獎";
        isSpinning = false;
        document.getElementById('spin-btn').disabled = false;
    }
</script>
</body>
</html>
