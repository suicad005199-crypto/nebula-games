<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>星雲娛樂城</title>
    <style>
        :root { --gold: #fccd4d; --bg: #050505; --card: #151515; }
        body { margin: 0; background: var(--bg); color: white; font-family: -apple-system, sans-serif; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        
        /* 導航列 */
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: env(safe-area-inset-top) 20px 10px; background: rgba(10,10,10,0.9); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .menu-btn { font-size: 24px; color: var(--gold); cursor: pointer; width: 60px; }
        .logo { font-size: 18px; font-weight: bold; color: var(--gold); letter-spacing: 2px; text-align: center; flex-grow: 1; }
        .login-btn { background: linear-gradient(135deg, #fceabb, #fccd4d); color: #000; border: none; padding: 6px 16px; border-radius: 20px; font-weight: bold; font-size: 13px; cursor: pointer; }

        /* 側邊選單 */
        .sidebar { position: fixed; top: 0; left: -80%; width: 75%; max-width: 300px; height: 100%; background: rgba(20,20,20,0.85); backdrop-filter: blur(25px); z-index: 1000; transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); border-right: 1px solid rgba(252,205,77,0.2); transform: translateX(0); }
        .sidebar.open { transform: translateX(106.6%); }
        .sidebar-header { padding: calc(env(safe-area-inset-top) + 40px) 20px 20px; background: linear-gradient(to right, rgba(252,205,77,0.15), transparent); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .sidebar-header h2 { margin: 0; font-size: 18px; color: var(--gold); }
        .sidebar-menu { list-style: none; padding: 0; margin: 0; }
        .sidebar-menu li { padding: 18px 25px; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 15px; cursor: pointer; display: flex; justify-content: space-between; transition: 0.2s; }
        .sidebar-menu li:active { background: rgba(252,205,77,0.1); color: var(--gold); }
        
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); opacity: 0; visibility: hidden; z-index: 150; transition: 0.3s; }
        .overlay.active { opacity: 1; visibility: visible; }

        /* 遊戲卡片 */
        .game-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 20px 15px; }
        .game-card { background: var(--card); border-radius: 16px; overflow: hidden; border: 1px solid rgba(255,255,255,0.08); transition: 0.15s; display: flex; flex-direction: column; cursor: pointer; }
        .game-card:active { transform: scale(0.95); border-color: var(--gold); }
        .game-img { width: 100%; aspect-ratio: 1 / 1; background-color: #222; background-size: cover; background-position: center; }
        .game-info { padding: 12px 10px; text-align: center; }
        .game-title { color: var(--gold); font-weight: bold; font-size: 14px; margin-bottom: 4px; display: block; }
        .game-desc { color: #999; font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
    </style>
</head>
<body>
    <div class="overlay" id="overlay"></div>
    
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header"><h2>星雲娛樂城</h2></div>
        <ul class="sidebar-menu">
            <li onclick="filterCategory('all')"><span>🏠 全部遊戲</span></li>
            <li onclick="filterCategory('棋牌')"><span>🃏 棋牌中心</span></li>
            <li onclick="filterCategory('老虎機')"><span>🎰 老虎機</span></li>
            <li onclick="filterCategory('限定')"><span>🔥 限定遊戲</span></li>
            <li onclick="filterCategory('LIVE')"><span>📺 真人 LIVE</span></li>
        </ul>
    </nav>

    <header class="navbar">
        <div class="menu-btn" onclick="toggleMenu()">☰</div>
        <div class="logo">星雲娛樂城</div>
        <button class="login-btn" id="login-btn">登入</button>
    </header>

    <main class="game-grid" id="game-grid">
        <p style="text-align: center; grid-column: span 2; color: #666; padding-top: 50px;">載入中...</p>
    </main>

    <script type="module" src="./js/lobby.js"></script>
    <script>
        // 控制側邊欄開關
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        function toggleMenu() { 
            sidebar.classList.toggle('open'); 
            overlay.classList.toggle('active'); 
        }
        overlay.onclick = toggleMenu;
    </script>
</body>
</html>
