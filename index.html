<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>星雲遊戲館</title>
    <style>
        :root {
            --gold: #fccd4d;
            --bg-color: #000000;
            --card-bg: #1a1a1a;
            --text-gray: #999;
            --safe-top: env(safe-area-inset-top);
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            font-family: -apple-system, sans-serif;
            color: white;
        }

        /* --- 頂部導航 --- */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: calc(var(--safe-top) + 10px) 20px 10px;
            background: #000;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .menu-btn { font-size: 24px; color: var(--gold); }
        .logo { font-size: 20px; font-weight: bold; color: var(--gold); letter-spacing: 1px; }
        .login-btn { background: var(--gold); color: #000; border: none; padding: 6px 18px; border-radius: 20px; font-weight: bold; }

        /* --- 遊戲卡片區域 --- */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 15px;
        }

        .game-card {
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            border: 0.5px solid #333;
            transition: transform 0.2s;
        }

        .game-card:active { transform: scale(0.96); }

        /* 遊戲圖片佔位 */
        .game-img {
            width: 100%;
            aspect-ratio: 1 / 1;
            background: #333; /* 實際使用時替換為 background-image */
            background-size: cover;
            background-position: center;
        }

        .game-info {
            padding: 12px 10px;
            text-align: center;
        }

        .game-title {
            color: var(--gold);
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 4px;
            display: block;
        }

        .game-desc {
            color: var(--text-gray);
            font-size: 11px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* --- 側邊欄 --- */
        .sidebar {
            position: fixed;
            top: 0; left: -280px;
            width: 260px; height: 100%;
            background: #111; z-index: 200;
            transition: 0.3s;
            padding-top: 60px;
        }
        .sidebar.open { left: 0; }
        .sidebar li { padding: 15px 25px; border-bottom: 1px solid #222; color: #ccc; list-style: none; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; z-index: 150; }
    </style>
</head>
<body>

    <div class="overlay" id="overlay"></div>
    
    <nav class="sidebar" id="sidebar">
        <ul>
            <li>全部</li><li>棋牌</li><li>老虎機</li><li>捕魚機</li><li>限定</li><li>LIVE</li>
        </ul>
    </nav>

    <header class="navbar">
        <div class="menu-btn" id="openMenu">☰</div>
        <div class="logo">星雲遊戲館</div>
        <button class="login-btn">登入</button>
    </header>

    <main class="game-grid">
        <div class="game-card">
            <div class="game-img" style="background-image: url('https://via.placeholder.com/200x200/222/gold?text=21Point');"></div>
            <div class="game-info">
                <span class="game-title">尊爵 21 點</span>
                <span class="game-desc">高額獎池，挑戰莊家極限</span>
            </div>
        </div>

        <div class="game-card">
            <div class="game-img" style="background-image: url('https://via.placeholder.com/200x200/222/gold?text=Poker');"></div>
            <div class="game-info">
                <span class="game-title">德州撲克</span>
                <span class="game-desc">全球玩家對戰，贏取籌碼</span>
            </div>
        </div>

        <div class="game-card">
            <div class="game-img" style="background-image: url('https://via.placeholder.com/200x200/222/gold?text=Dice');"></div>
            <div class="game-info">
                <span class="game-title">急速推筒子</span>
                <span class="game-desc">傳統藝術與財富的交響樂</span>
            </div>
        </div>

        <div class="game-card">
            <div class="game-img" style="background-image: url('https://via.placeholder.com/200x200/222/gold?text=Baccarat');"></div>
            <div class="game-info">
                <span class="game-title">皇城百家樂</span>
                <span class="game-desc">經典奢華，開創財富傳奇</span>
            </div>
        </div>
    </main>

    <script>
        const sb = document.getElementById('sidebar');
        const ov = document.getElementById('overlay');
        document.getElementById('openMenu').onclick = () => { sb.classList.add('open'); ov.style.display='block'; };
        ov.onclick = () => { sb.classList.remove('open'); ov.style.display='none'; };
    </script>
</body>
</html>
