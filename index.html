<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>星雲娛樂城 - iOS VIP</title>
    <style>
        :root {
            --gold: #fccd4d;
            --gold-gradient: linear-gradient(135deg, #fceabb 0%, #fccd4d 50%, #f8b500 100%);
            --ios-bg: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.08);
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        body {
            margin: 0;
            background-color: var(--ios-bg);
            font-family: -apple-system, system-ui, sans-serif;
            color: white;
            padding-top: var(--safe-top);
        }

        /* 頂部導航欄 */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            height: 44px;
            position: sticky;
            top: var(--safe-top);
            background: var(--ios-bg);
            z-index: 100;
        }

        .nav-icon { font-size: 24px; cursor: pointer; width: 60px; }
        
        .logo {
            flex-grow: 1;
            text-align: center;
            font-weight: 800;
            font-size: 20px;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }

        .login-btn {
            background: var(--gold-gradient);
            color: #000;
            border: none;
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 13px;
            font-weight: bold;
            width: 60px;
        }

        /* 遊戲分類水平滾動 */
        .category-bar {
            display: flex;
            overflow-x: auto;
            white-space: nowrap;
            padding: 10px 15px;
            gap: 10px;
            scrollbar-width: none; /* Firefox */
        }
        .category-bar::-webkit-scrollbar { display: none; } /* Chrome/Safari */

        .cat-item {
            padding: 8px 18px;
            background: var(--glass);
            border-radius: 20px;
            font-size: 14px;
            border: 0.5px solid rgba(255,255,255,0.1);
        }
        .cat-item.active {
            background: var(--gold-gradient);
            color: #000;
            font-weight: bold;
        }

        /* 遊戲卡片區域 */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 15px;
            padding-bottom: calc(80px + var(--safe-bottom));
        }

        .game-card {
            aspect-ratio: 1.1 / 1;
            background: var(--glass);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            transition: transform 0.1s;
        }

        .game-card:active { transform: scale(0.95); }

        .game-card .icon-box {
            font-size: 40px;
            margin-bottom: 8px;
            filter: drop-shadow(0 0 5px rgba(252, 205, 77, 0.5));
        }

        .game-card span { font-size: 14px; font-weight: 500; }

        /* 底部導航 */
        .tab-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: calc(55px + var(--safe-bottom));
            background: rgba(15, 15, 15, 0.9);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: space-around;
            padding-top: 10px;
            border-top: 0.5px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="nav-icon">☰</div>
        <div class="logo">星雲娛樂城</div>
        <button class="login-btn">登入</button>
    </header>

    <div class="category-bar">
        <div class="cat-item active">全部</div>
        <div class="cat-item">棋牌</div>
        <div class="cat-item">老虎機</div>
        <div class="cat-item">捕魚機</div>
        <div class="cat-item">限定</div>
        <div class="cat-item">LIVE</div>
    </div>

    <main class="game-grid">
        <div class="game-card">
            <div class="icon-box">♠️</div>
            <span>21點</span>
        </div>
        <div class="game-card">
            <div class="icon-box">🏎️</div>
            <span>北京賽車</span>
        </div>
        <div class="game-card">
            <div class="icon-box">🃏</div>
            <span>德州撲克</span>
        </div>
        <div class="game-card">
            <div class="icon-box">🎲</div>
            <span>推筒子</span>
        </div>
        <div class="game-card">
            <div class="icon-box">💰</div>
            <span>百家樂</span>
        </div>
        <div class="game-card">
            <div class="icon-box">🐉</div>
            <span>射龍門</span>
        </div>
    </main>

    <nav class="tab-bar">
        <span>🏠大廳</span>
        <span>🎁優惠</span>
        <span>💳儲值</span>
        <span>👤會員</span>
    </nav>

</body>
</html>
