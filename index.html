<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>星雲娛樂城 | NEBULA CASINO</title>
    <style>
        :root { 
            --gold: #fccd4d; 
            --bg: #0b0b0d; 
            --card: #161618;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --nav-h: 65px;
        }
        
        body { margin: 0; background: var(--bg); color: white; font-family: 'Inter', -apple-system, sans-serif; overflow-x: hidden; }

        /* 導航列 */
        .navbar { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: env(safe-area-inset-top) 20px 10px; 
            background: rgba(11, 11, 13, 0.9); backdrop-filter: blur(20px); 
            position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border);
        }
        .logo { font-size: 18px; font-weight: 900; color: var(--gold); letter-spacing: 1.5px; text-transform: uppercase; }
        .menu-btn { font-size: 26px; color: var(--gold); cursor: pointer; transition: 0.2s; }

        /* 側邊選單 */
        .sidebar { 
            position: fixed; top: 0; left: -100%; width: 280px; height: 100%; 
            background: #0f0f11; z-index: 1001; 
            transition: 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column;
        }
        .sidebar.open { left: 0; }
        .sidebar-header { padding: 60px 25px 30px; border-bottom: 1px solid var(--border); }
        .sidebar-header h2 { margin: 0; font-size: 20px; color: var(--gold); }

        .sidebar-menu { list-style: none; padding: 10px 0; margin: 0; flex-grow: 1; }
        .sidebar-menu li { 
            padding: 18px 25px; font-size: 15px; color: #aaa; 
            cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 12px;
        }
        .sidebar-menu li:active, .sidebar-menu li.active { background: var(--glass); color: var(--gold); }
        .sidebar-menu li i { font-style: normal; font-size: 18px; }
        
        /* 語言設定專屬樣式 */
        .sidebar-footer { padding: 20px; border-top: 1px solid var(--border); }
        .lang-item { color: #666; font-size: 13px; display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 10px; border-radius: 8px; }
        .lang-item:active { background: var(--glass); color: #fff; }

        /* 背景遮罩 */
        .overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.8); 
            backdrop-filter: blur(5px); opacity: 0; visibility: hidden; z-index: 1000; transition: 0.3s; 
        }
        .overlay.active { opacity: 1; visibility: visible; }

        /* 輪播區 */
        .hero { padding: 15px; }
        .promo-banner { 
            width: 100%; height: 140px; border-radius: 16px; border: 1px solid var(--border); 
            position: relative; overflow: hidden; touch-action: pan-y;
        }
        .banner-slide { position: absolute; inset: 0; background-size: cover; background-position: center; opacity: 0; transition: opacity 0.6s; }
        .banner-slide.active { opacity: 1; }
        .banner-dots { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; z-index: 10; }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.3); transition: 0.3s; }
        .dot.active { background: var(--gold); width: 16px; border-radius: 10px; }

        /* 遊戲網格與分頁 */
        .game-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px 15px 20px; }
        .game-card { background: var(--card); border-radius: 10px; overflow: hidden; border: 1px solid var(--border); transition: 0.2s; position: relative; }
        .game-img-wrapper { position: relative; width: 100%; aspect-ratio: 1/1; }
        .game-img { width: 100%; height: 100%; background-size: cover; background-position: center; }
        .game-badge { position: absolute; bottom: 6px; left: 6px; background: rgba(0,0,0,0.7); padding: 2px 6px; border-radius: 4px; font-size: 9px; color: var(--gold); backdrop-filter: blur(4px); }
        .game-info { padding: 8px; }
        .game-title { color: #fff; font-weight: 600; font-size: 12px; margin-bottom: 2px; }
        .game-desc { color: #555; font-size: 9px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .pagination { 
            display: flex; justify-content: center; align-items: center; gap: 15px; 
            margin-bottom: calc(var(--nav-h) + 40px); 
        }
        .page-btn { background: var(--glass); border: 1px solid var(--border); color: #aaa; padding: 6px 14px; border-radius: 20px; font-size: 12px; }

        /* --- 底部導航列 (Tab Bar) --- */
        .tab-bar {
            position: fixed; bottom: 0; left: 0; width: 100%;
            height: var(--nav-h);
            background: rgba(15, 15, 17, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            display: flex; justify-content: space-around; align-items: center;
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 1000;
        }
        .tab-item {
            flex: 1; display: flex; flex-direction: column; align-items: center;
            color: #888; text-decoration: none; transition: 0.2s;
            background: none; border: none; padding: 0; /* 按鈕樣式重設 */
        }
        .tab-item i { font-style: normal; font-size: 20px; margin-bottom: 4px; }
        .tab-item span { font-size: 11px; font-weight: 500; }
        .tab-item.active { color: var(--gold); }
        .tab-item:active { transform: scale(0.9); }
    </style>
</head>
<body>
    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
    
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header"><h2>選單 MENU</h2></div>
        <ul class="sidebar-menu">
            <li onclick="filterCategory('all', this)" class="active"><i>🏠</i> 全部遊戲</li>
            <li onclick="filterCategory('棋牌', this)"><i>🃏</i> 棋牌中心</li>
            <li onclick="filterCategory('老虎機', this)"><i>🎰</i> 熱門老虎機</li>
            <li onclick="filterCategory('限定', this)"><i>🔞</i> 限定推薦</li>
            <li onclick="filterCategory('LIVE', this)"><i>📺</i> 真人LIVE</li>
        </ul>
        <div class="sidebar-footer">
            <div class="lang-item" onclick="alert('語言切換功能開發中')">
                <i>🌐</i> <span>Language / 語言設定</span>
            </div>
        </div>
    </nav>

    <header class="navbar">
        <div class="menu-btn" onclick="toggleMenu()">☰</div>
        <div class="logo">NEBULA CASINO</div>
        <button class="login-btn" style="background:var(--gold); border:none; border-radius:20px; padding:6px 15px; font-weight:bold; font-size:12px;">登入</button>
    </header>

    <section class="hero">
        <div class="promo-banner" id="promo-banner">
            <div class="banner-slide active" style="background-image: url('./images/banner.jpg');"></div>
            <div class="banner-slide" style="background-image: url('./images/banner2.jpg');"></div>
            <div class="banner-slide" style="background-image: url('./images/banner3.jpg');"></div>
            <div class="banner-dots" id="banner-dots"></div>
        </div>
    </section>

    <main class="game-grid" id="game-grid">
        <p style="text-align: center; grid-column: span 2; padding: 40px; color: #333;">LOADING...</p>
    </main>

    <div class="pagination" id="pagination" style="display: none;">
        <button class="page-btn" id="prev-btn" onclick="changePage(-1)">◀ 上一頁</button>
        <span class="page-info" id="page-num">1</span>
        <button class="page-btn" id="next-btn" onclick="changePage(1)">下一頁 ▶</button>
    </div>

    <nav class="tab-bar">
        <a href="#" class="tab-item active" onclick="setActiveTab(this)"><i>🏠</i><span>大廳</span></a>
        <a href="#" class="tab-item" onclick="setActiveTab(this)"><i>💰</i><span>儲值</span></a>
        <button class="tab-item" onclick="toggleMenu()"><i>☰</i><span>選單</span></button>
        <a href="#" class="tab-item" onclick="setActiveTab(this)"><i>🎧</i><span>客服</span></a>
        <a href="#" class="tab-item" onclick="setActiveTab(this)"><i>👤</i><span>會員</span></a>
    </nav>

    <script type="module" src="./js/lobby.js"></script>
    <script>
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        }
        window.toggleMenu = toggleMenu;

        function setActiveTab(el) {
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            // 如果點擊的是大廳等分頁，確保側邊欄關閉
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('overlay').classList.remove('active');
        }
        window.setActiveTab = setActiveTab;

        // 輪播初始化
        function initBanner() {
            const banner = document.getElementById('promo-banner');
            const slides = document.querySelectorAll('.banner-slide');
            const dotsContainer = document.getElementById('banner-dots');
            let currentSlide = 0; let timer = null; let startX = 0;
            if (slides.length <= 1) return;
            slides.forEach((_, i) => {
                const dot = document.createElement('div');
                dot.classList.add('dot');
                if (i === 0) dot.classList.add('active');
                dot.onclick = () => goToSlide(i);
                dotsContainer.appendChild(dot);
            });
            const dots = document.querySelectorAll('.dot');
            function goToSlide(n) {
                if(!slides[currentSlide]) return;
                slides[currentSlide].classList.remove('active');
                dots[currentSlide].classList.remove('active');
                currentSlide = (n + slides.length) % slides.length;
                slides[currentSlide].classList.add('active');
                dots[currentSlide].classList.add('active');
                resetTimer();
            }
            function nextSlide() { goToSlide(currentSlide + 1); }
            function resetTimer() { clearInterval(timer); timer = setInterval(nextSlide, 5000); }
            banner.addEventListener('touchstart', (e) => startX = e.touches[0].clientX, {passive:true});
            banner.addEventListener('touchend', (e) => {
                const diff = startX - e.changedTouches[0].clientX;
                if (Math.abs(diff) > 50) diff > 0 ? nextSlide() : goToSlide(currentSlide - 1);
            }, {passive:true});
            resetTimer();
        }
        document.addEventListener('DOMContentLoaded', initBanner);
    </script>
</body>
</html>
