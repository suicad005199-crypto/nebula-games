<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>星雲娛樂城 | 星際奢華體驗</title>
    <style>
        :root { 
            --gold: #fccd4d; 
            --gold-dark: #b8860b;
            --bg: #0a0a0b; 
            --card: #1a1a1c;
            --glass: rgba(255, 255, 255, 0.05);
        }
        
        body { margin: 0; background: var(--bg); color: white; font-family: 'Inter', -apple-system, sans-serif; overflow-x: hidden; }

        /* 頂部導航 */
        .navbar { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: env(safe-area-inset-top) 20px 10px; 
            background: rgba(10, 10, 11, 0.8); backdrop-filter: blur(20px); 
            position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--glass);
        }
        .logo { font-size: 20px; font-weight: 900; background: linear-gradient(to right, #fff, var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 1px; }

        /* 英雄公告區 (模擬 Trino 風格) */
        .hero { padding: 20px; margin-bottom: 10px; }
        .promo-banner { 
            width: 100%; height: 160px; border-radius: 20px;
            background: linear-gradient(45deg, #1a1a1c, #2a2a2e);
            border: 1px solid var(--glass); position: relative; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        .promo-banner::after { content: "WELCOME BONUS +100%"; color: var(--gold); font-weight: bold; font-size: 24px; opacity: 0.5; }

        /* 橫向分類 Pill 選單 */
        .category-bar { 
            display: flex; overflow-x: auto; gap: 10px; padding: 10px 20px; 
            scrollbar-width: none; -ms-overflow-style: none;
        }
        .category-bar::-webkit-scrollbar { display: none; }
        .cat-pill { 
            white-space: nowrap; padding: 10px 20px; border-radius: 50px; 
            background: var(--glass); border: 1px solid transparent; 
            font-size: 13px; font-weight: 600; color: #888; transition: 0.3s;
        }
        .cat-pill.active { background: var(--gold); color: #000; border-color: var(--gold); box-shadow: 0 0 15px rgba(252, 205, 77, 0.3); }

        /* 遊戲網格與卡片 */
        .game-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 10px 15px 100px; }
        .game-card { 
            background: var(--card); border-radius: 12px; overflow: hidden; 
            border: 1px solid var(--glass); transition: transform 0.2s; position: relative;
        }
        .game-card:active { transform: scale(0.96); }
        .game-img-wrapper { position: relative; width: 100%; aspect-ratio: 1/1; overflow: hidden; }
        .game-img { width: 100%; height: 100%; background-size: cover; background-position: center; transition: 0.5s; }
        .game-badge { position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,0.6); padding: 2px 8px; border-radius: 4px; font-size: 10px; color: var(--gold); border: 1px solid var(--gold); }
        
        .game-info { padding: 10px; background: linear-gradient(to top, #111, transparent); }
        .game-title { color: #fff; font-weight: bold; font-size: 14px; margin-bottom: 2px; }
        .game-desc { color: #666; font-size: 10px; }

        /* 側邊欄與 Overlay */
        .sidebar { position: fixed; top: 0; left: -100%; width: 280px; height: 100%; background: #0f0f11; z-index: 1001; transition: 0.4s cubic-bezier(0.19, 1, 0.22, 1); }
        .sidebar.open { left: 0; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); opacity: 0; visibility: hidden; z-index: 1000; transition: 0.3s; }
        .overlay.active { opacity: 1; visibility: visible; }
    </style>
</head>
<body>
    <div class="overlay" id="overlay"></div>
    <header class="navbar">
        <div class="menu-btn" onclick="toggleMenu()" style="color:var(--gold); font-size: 24px;">☰</div>
        <div class="logo">NEBULA CASINO</div>
        <div style="width: 40px;"></div>
    </header>

    <section class="hero">
        <div class="promo-banner"></div>
    </section>

    <div class="category-bar" id="category-bar">
        <div class="cat-pill active" onclick="filterCategory('all', this)">全部</div>
        <div class="cat-pill" onclick="filterCategory('棋牌', this)">棋牌</div>
        <div class="cat-pill" onclick="filterCategory('老虎機', this)">老虎機</div>
        <div class="cat-pill" onclick="filterCategory('限定', this)">限定</div>
        <div class="cat-pill" onclick="filterCategory('LIVE', this)">真人</div>
    </div>

    <main class="game-grid" id="game-grid">
        <p style="text-align: center; grid-column: span 2; padding: 40px; color: #444;">載入中...</p>
    </main>

    <script type="module" src="./js/lobby.js"></script>
    <script>
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        function toggleMenu() { /* 保持原邏輯 */ }
    </script>
</body>
</html>
