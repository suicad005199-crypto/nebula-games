<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>星雲娛樂城 | NEBULA CASINO</title>
    <style>
        :root { 
            --gold: #fccd4d;
            --gold-grad: linear-gradient(135deg, #fccd4d 0%, #fb9a32 100%);
            --bg: #0b0b0d; 
            --card: #161618;
            --border: rgba(255, 255, 255, 0.08);
            --nav-h: 60px;
        }
        
        body { 
            margin: 0; background: var(--bg); color: white; 
            font-family: 'PingFang TC', sans-serif; overflow-x: hidden;
        }

        /* 導航列 */
        .navbar { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: env(safe-area-inset-top) 15px 10px; 
            background: rgba(11, 11, 13, 0.95); backdrop-filter: blur(20px); 
            position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border);
        }
        .logo { font-size: 18px; font-weight: 900; color: var(--gold); letter-spacing: 1px; }

        /* 1. BANNER 區 */
        .hero { padding: 10px 15px; }
        .promo-banner { 
            width: 100%; height: 150px; border-radius: 12px; overflow: hidden; 
            position: relative; border: 1px solid var(--border);
        }
        .banner-slide { position: absolute; inset: 0; background-size: cover; background-position: center; opacity: 0; transition: 0.8s; }
        .banner-slide.active { opacity: 1; }
        .banner-dots { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; }
        .dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,0.3); }
        .dot.active { background: var(--gold); width: 14px; border-radius: 10px; }

        /* 2. 公告區 */
        .marquee-bar {
            background: #1a1a1d; height: 32px; display: flex; align-items: center;
            padding: 0 15px; font-size: 12px; border-bottom: 1px solid var(--border);
        }
        .marquee-label { color: var(--gold); font-weight: bold; margin-right: 10px; white-space: nowrap; }
        .marquee-content { flex: 1; overflow: hidden; white-space: nowrap; }
        .marquee-text { display: inline-block; animation: scroll 15s linear infinite; }
        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* 3. 遊戲區標題 */
        .section-header { 
            padding: 15px 15px 5px; display: flex; align-items: center; gap: 8px;
        }
        .section-title { font-size: 14px; font-weight: bold; color: var(--gold); margin: 0; }
        .section-line { flex: 1; height: 1px; background: var(--border); }

        /* 4. 遊戲網格 (4個一頁) */
        .game-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 10px 15px 20px; }
        .game-card { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
        .game-img-wrapper { position: relative; aspect-ratio: 4/3; }
        .game-img { width: 100%; height: 100%; background-size: cover; background-position: center; }
        .game-info { padding: 8px 10px; }
        .game-title { font-weight: 600; font-size: 13px; margin-bottom: 2px; }
        .game-desc { color: #666; font-size: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* 分頁器 */
        .pagination { display: flex; justify-content: center; align-items: center; gap: 15px; padding-bottom: 100px; }
        .page-btn { background: var(--glass); border: 1px solid var(--border); color: #fff; padding: 6px 15px; border-radius: 20px; font-size: 12px; }
        .page-btn:disabled { opacity: 0.3; }

        /* 底部導航 */
        .tab-bar {
            position: fixed; bottom: 0; width: 100%; height: var(--nav-h);
            background: rgba(15, 15, 17, 0.98); backdrop-filter: blur(20px);
            border-top: 1px solid var(--border); display: flex; z-index: 1000;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #888; border: none; background: none; font-size: 10px; }
        .tab-item.active { color: var(--gold); }
        .tab-item i { font-size: 20px; margin-bottom: 2px; font-style: normal; }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="logo">NEBULA CASINO</div>
        <button class="login-btn" style="background:var(--gold-grad); border:none; border-radius:20px; padding:6px 16px; font-weight:bold; font-size:12px;">登入</button>
    </header>

    <section class="hero">
        <div class="promo-banner" id="promo-banner">
            <div class="banner-slide active" style="background-image: url('./images/banner.jpg');"></div>
            <div class="banner-slide" style="background-image: url('./images/banner2.jpg');"></div>
            <div class="banner-dots" id="banner-dots"></div>
        </div>
    </section>

    <div class="marquee-bar">
        <span class="marquee-label">NOTICE</span>
        <div class="marquee-content">
            <span class="marquee-text">歡迎來到星雲娛樂城，首儲即送 100% 禮金！全站遊戲公平公正，祝您好運。</span>
        </div>
    </div>

    <div class="section-header">
        <h3 class="section-title" id="display-title">熱門推薦 TOP 4</h3>
        <div class="section-line"></div>
    </div>

    <main class="game-grid" id="game-grid">
        </main>

    <div class="pagination" id="pagination">
        <button class="page-btn" id="prev-btn" onclick="changePage(-1)">PREV</button>
        <span id="page-num" style="color: var(--gold); font-weight: bold;">1</span>
        <button class="page-btn" id="next-btn" onclick="changePage(1)">NEXT</button>
    </div>

    <nav class="tab-bar">
        <button class="tab-item active"><i>🏠</i><span>大廳</span></button>
        <button class="tab-item"><i>💰</i><span>儲值</span></button>
        <button class="tab-item"><i>🎧</i><span>客服</span></button>
        <button class="tab-item"><i>👤</i><span>會員</span></button>
    </nav>

    <script type="module" src="./js/lobby.js"></script>
</body>
</html>
